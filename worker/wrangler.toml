name = "chilly-phone-push"
main = "src/index.js"
compatibility_date = "2024-12-01"

# web-push + agent-base 依赖 Node.js 内建模块 (http, https, url, util, buffer)
# Workers 默认不带,加这个标志让 Workers 提供 polyfill
compatibility_flags = ["nodejs_compat"]

# --- KV 命名空间 ---
# 首次部署前先跑:
#   npx wrangler kv:namespace create SUBSCRIPTIONS
#   npx wrangler kv:namespace create SCHEDULED
# 然后把返回的 id 填到下面
[[kv_namespaces]]
binding = "SUBSCRIPTIONS"
id = "REPLACE_WITH_ACTUAL_ID"
preview_id = "REPLACE_WITH_PREVIEW_ID"

[[kv_namespaces]]
binding = "SCHEDULED"
id = "REPLACE_WITH_ACTUAL_ID"
preview_id = "REPLACE_WITH_PREVIEW_ID"

# --- 定时触发器:每分钟跑一次,处理已到期的排程推送 ---
[triggers]
crons = ["* * * * *"]

# --- 环境变量(非敏感)---
[vars]
# 你的站点 URL,点击通知时打开这个地址
SITE_URL = "https://qiaqiao-phone.pages.dev"
# 通知里显示的来源名
APP_NAME = "Chilly Phone"

# --- 密钥(部署前用 `wrangler secret put` 设置)---
# VAPID_PUBLIC_KEY   = 通过 `npx web-push generate-vapid-keys` 生成
# VAPID_PRIVATE_KEY  = 同上
# VAPID_SUBJECT      = mailto:your@email.com
