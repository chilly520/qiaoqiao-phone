<svg width="1080" height="1920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.1);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0);stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1080" height="1920" fill="url(#grad1)"/>
  
  <!-- 装饰圆圈 -->
  <circle cx="200" cy="300" r="150" fill="rgba(255,255,255,0.05)"/>
  <circle cx="880" cy="400" r="200" fill="rgba(255,255,255,0.03)"/>
  <circle cx="540" cy="960" r="400" fill="rgba(255,255,255,0.02)"/>
  <circle cx="150" cy="1600" r="250" fill="rgba(255,255,255,0.04)"/>
  <circle cx="930" cy="1500" r="180" fill="rgba(255,255,255,0.03)"/>
  
  <!-- 光晕效果 -->
  <rect width="1080" height="1920" fill="url(#grad2)"/>
</svg>
