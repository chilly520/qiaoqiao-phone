name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

# Default GITHUB_TOKEN is read-only; releases need contents:write
# (and pull-requests:read to auto-generate release notes).
permissions:
  contents: write
  pull-requests: read

jobs:
  apk:
    name: Build & Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./src/version.json').version")
          CODE=$(echo "$VERSION" | cut -d. -f3)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "code=$CODE" >> $GITHUB_OUTPUT

      - name: Update twa-manifest version
        run: |
          node -e "
            const fs = require('fs');
            const p = 'android-app/twa-manifest.json';
            const m = JSON.parse(fs.readFileSync(p, 'utf8'));
            m.appVersionName = '${{ steps.version.outputs.version }}';
            m.appVersionCode = parseInt('${{ steps.version.outputs.code }}');
            fs.writeFileSync(p, JSON.stringify(m, null, 2));
          "

      - name: Generate debug signing key
        run: |
          keytool -genkeypair \
            -keystore android-app/android.keystore \
            -alias android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Chilly Phone, O=qiaoqiao, C=CN"

      # Pre-write bubblewrap config so it never prompts for JDK / Android SDK paths.
      # loadOrCreateConfig() only prompts when jdkPath / androidSdkPath are empty.
      # Also: bubblewrap's validatePath() requires $ANDROID_HOME to contain a `tools/` or `bin/`
      # subdir. The GitHub Actions SDK only ships `cmdline-tools/`, so we symlink sdkmanager
      # into `bin/` to satisfy validation (and installBuildTools, if ever needed).
      - name: Configure bubblewrap paths (non-interactive)
        run: |
          mkdir -p "$ANDROID_HOME/bin"
          ln -sf "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "$ANDROID_HOME/bin/sdkmanager"
          mkdir -p "$HOME/.bubblewrap"
          printf '{\n  "jdkPath": "%s",\n  "androidSdkPath": "%s"\n}\n' "$JAVA_HOME" "$ANDROID_HOME" > "$HOME/.bubblewrap/config.json"
          echo "Wrote bubblewrap config:"
          cat "$HOME/.bubblewrap/config.json"
          echo "SDK bin symlink:"
          ls -la "$ANDROID_HOME/bin/"

      # --skipVersionUpgrade: skip the "new app version name" prompt.
      # update regenerates the Android project fresh + writes manifest-checksum.txt.
      - name: Bubblewrap update
        working-directory: android-app
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: npx @bubblewrap/cli update --skipPwaValidation --skipVersionUpgrade

      # Signing passwords come from env vars (getPasswords reads them first).
      # manifest-checksum.txt now matches, so the "update project?" prompt is skipped.
      - name: Bubblewrap build
        working-directory: android-app
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          BUBBLEWRAP_KEYSTORE_PASSWORD: android
          BUBBLEWRAP_KEY_PASSWORD: android
        run: npx @bubblewrap/cli build --skipPwaValidation

      - name: Find and rename APK
        run: |
          echo "Searching for APK files..."
          find android-app -name "*.apk" -o -name "*.aab" 2>/dev/null
          APK=$(find android-app -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "No APK found, listing android-app contents:"
            ls -la android-app/ 2>/dev/null
            exit 1
          fi
          cp "$APK" "chilly-phone-${{ steps.version.outputs.version }}.apk"
          echo "APK: chilly-phone-${{ steps.version.outputs.version }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chilly-phone-apk
          path: chilly-phone-*.apk
          retention-days: 90

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Chilly Phone ${{ steps.version.outputs.version }}
          files: chilly-phone-*.apk
          generate_release_notes: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
