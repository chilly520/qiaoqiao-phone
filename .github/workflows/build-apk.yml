name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  apk:
    name: Build & Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./src/version.json').version")
          CODE=$(echo "$VERSION" | cut -d. -f3)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "code=$CODE" >> $GITHUB_OUTPUT

      - name: Update twa-manifest version
        run: |
          node -e "
            const fs = require('fs');
            const p = 'android-app/twa-manifest.json';
            const m = JSON.parse(fs.readFileSync(p, 'utf8'));
            m.appVersionName = '${{ steps.version.outputs.version }}';
            m.appVersionCode = parseInt('${{ steps.version.outputs.code }}');
            fs.writeFileSync(p, JSON.stringify(m, null, 2));
          "

      - name: Generate debug signing key
        run: |
          keytool -genkeypair \
            -keystore android-app/android.keystore \
            -alias android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Chilly Phone, O=qiaoqiao, C=CN"

      - name: Bubblewrap update & build (Docker)
        working-directory: android-app
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: android
          BUBBLEWRAP_KEY_PASSWORD: android
        run: |
          # 用官方 Docker 镜像, 预装 JDK17 + Android SDK, 不会弹路径提示
          docker run --rm \
            -v "$(pwd):/app" \
            -w /app \
            -e BUBBLEWRAP_KEYSTORE_PASSWORD=android \
            -e BUBBLEWRAP_KEY_PASSWORD=android \
            -e CI=true \
            ghcr.io/googlechromelabs/bubblewrap:latest \
            sh -c 'npx @bubblewrap/cli update --skipPwaValidation && npx @bubblewrap/cli build --skipPwaValidation --force'

      - name: Rename APK
        run: |
          APK=$(find android-app -name "*.apk" | head -1)
          cp "$APK" "chilly-phone-${{ steps.version.outputs.version }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chilly-phone-apk
          path: chilly-phone-*.apk
          retention-days: 90

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Chilly Phone ${{ steps.version.outputs.version }}
          files: chilly-phone-*.apk
          generate_release_notes: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
