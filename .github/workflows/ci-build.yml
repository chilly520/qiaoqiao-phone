name: CI Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies (try clean install, fallback to install)
        run: |
          set -e
          echo "Trying npm ci first..."
          npm ci || (echo "npm ci failed, falling back to npm install" && npm install --no-audit --no-fund)

      - name: Rebuild esbuild (safe-guard)
        run: |
          npm rebuild esbuild || true

      - name: Build
        run: npm run build

      - name: Upload build output
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
