name: CI Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Prepare install (remove lockfile to avoid platform-specific esbuild entries)
        run: |
          echo "Removing package-lock.json to avoid platform-specific lock entries on CI"
          rm -f package-lock.json || true

      - name: Install dependencies (npm install)
        run: |
          set -e
          echo "Installing dependencies with npm install"
          npm install --no-audit --no-fund

      - name: Dump installed esbuild info
        run: |
          echo "esbuild versions installed:";
          npm ls esbuild --depth=0 || true
          echo "node & npm:"; node -v; npm -v

      - name: Rebuild esbuild (safe-guard)
        run: |
          npm rebuild esbuild || true

      - name: Build
        run: npm run build

      - name: Upload build output
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
