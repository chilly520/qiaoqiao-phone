name: Build Android Native APK

on:
  push:
    branches: [main]
  workflow_dispatch:

# Default GITHUB_TOKEN is read-only; releases need contents:write
permissions:
  contents: write
  pull-requests: read

jobs:
  apk:
    name: Build & Release Native APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Build PWA 需要 node + npm
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Read version
        id: version
        working-directory: android-native
        run: |
          # 从 src/version.json 读 (跟 TWA 共享)
          VERSION=$(node -p "require('../src/version.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build PWA
        run: |
          # 跟 ci-build.yml 一致: 删锁文件 + npm install + 重建 esbuild (避免平台不匹配导致 native 构建挂)
          rm -f package-lock.json || true
          npm install --no-audit --no-fund
          npm rebuild esbuild || true
          # 先 build PWA 把 dist/ 准备好, 然后把 dist 复制到 android assets/
          # 这样 WebView 加载 file:///android_asset/index.html, 不走网络, 国内秒开.
          npm run build
          rm -rf android-native/app/src/main/assets
          mkdir -p android-native/app/src/main/assets
          cp -r dist/. android-native/app/src/main/assets/
          du -sh android-native/app/src/main/assets
          echo "--- assets contents (top 10) ---"
          ls android-native/app/src/main/assets/ | head -10

      - name: Install Gradle 8.5
        run: |
          # 不用 gradle/actions/setup-gradle (它的内置 cache 偶尔会挂掉阻塞 build)
          # 显式从 services.gradle.org 下载并解压
          GRADLE_VERSION="8.5"
          GRADLE_DIST="gradle-${GRADLE_VERSION}-bin.zip"
          GRADLE_HOME="/opt/gradle-${GRADLE_VERSION}"
          if [ ! -d "$GRADLE_HOME" ]; then
            echo "Downloading Gradle $GRADLE_VERSION ..."
            curl -sSL -o "/tmp/${GRADLE_DIST}" \
              "https://services.gradle.org/distributions/${GRADLE_DIST}"
            ls -la "/tmp/${GRADLE_DIST}"
            sudo mkdir -p "$GRADLE_HOME"
            sudo unzip -q "/tmp/${GRADLE_DIST}" -d /opt
            sudo ln -sf "/opt/gradle-${GRADLE_VERSION}/bin/gradle" /usr/local/bin/gradle
            gradle --version
          fi

      # Gradle 依赖缓存 (用 actions/cache, 失败不影响 build)
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-native/**/build.gradle.kts', 'android-native/**/settings.gradle.kts', 'android-native/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
        continue-on-error: true

      # Android SDK (API 34 + build-tools 34)
      # 注意: 和 TWA workflow (build-apk.yml) 保持完全一致 — v3 不指定 cmdline-tools-version
      #      之前用 v4 + cmdline-tools-version 在 7s 内失败, 是 v4 不接受 11076708 这个版本号
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      # 取固定的签名密钥 (第一次需要手动设置 Secrets, 见 README)
      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android-native/android.keystore
          ls -la android-native/android.keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.CHILLY_KEYSTORE_BASE64 }}

      - name: Build release APK
        working-directory: android-native
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android-native/android.keystore
          KEYSTORE_PASSWORD: ${{ secrets.CHILLY_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.CHILLY_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.CHILLY_KEY_PASSWORD }}
          # 显式 GRADLE_OPTS: 用系统 gradle 时 gradle.properties 的 Xmx 偶尔被吞,显式保险
          GRADLE_OPTS: "-Xmx3g -Dfile.encoding=UTF-8 -XX:+HeapDumpOnOutOfMemoryError"
        run: |
          # 默认密码 (临时签名时用)
          export KEYSTORE_PASSWORD="${KEYSTORE_PASSWORD:-android}"
          export KEY_ALIAS="${KEY_ALIAS:-android}"
          export KEY_PASSWORD="${KEY_PASSWORD:-android}"
          export KEYSTORE_PATH="$PWD/android.keystore"

          if [ ! -f android.keystore ]; then
            echo "::warning::No keystore, generating a temporary one (cannot upgrade later)"
            keytool -genkeypair \
              -keystore android.keystore \
              -alias android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Chilly Phone, O=qiaoqiao, C=CN"
          fi
          ls -la android.keystore
          # 关键: 用项目自带的 ./gradlew (wrapper 锁了 Gradle 8.5, 跟 AGP 8.2.2 严格匹配)
          # 不用 system gradle (ubuntu-latest 默认装的可能是别的版本, AGP 不认就 worker 早挂)
          chmod +x gradlew
          ./gradlew --version
          # --info 让失败时打出真正的 cause,而不是被 Java 栈吞掉
          ./gradlew assembleRelease --no-daemon --stacktrace --info 2>&1 | tee gradle-build.log
          EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ]; then
            echo "::error::Gradle build failed with exit $EXIT. Last 80 lines:"
            tail -80 gradle-build.log
            exit $EXIT
          fi

      - name: Rename APK
        run: |
          ls -la android-native/app/build/outputs/apk/release/ 2>/dev/null
          APK=$(find android-native/app/build/outputs/apk/release -name "*.apk" ! -name "*unsigned*" ! -name "*unaligned*" | head -1)
          if [ -z "$APK" ]; then
            echo "No signed APK found"
            find android-native/app/build/outputs/ -name "*.apk"
            exit 1
          fi
          cp "$APK" "chilly-phone-native-${{ steps.version.outputs.version }}.apk"
          echo "Final: chilly-phone-native-${{ steps.version.outputs.version }}.apk"
          ls -la "chilly-phone-native-${{ steps.version.outputs.version }}.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chilly-phone-native-apk
          path: chilly-phone-native-*.apk
          retention-days: 90

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-native
          name: Chilly Phone Native ${{ steps.version.outputs.version }}
          files: chilly-phone-native-*.apk
          generate_release_notes: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
