name: Build Android Native APK

on:
  push:
    branches: [main]
  workflow_dispatch:

# Default GITHUB_TOKEN is read-only; releases need contents:write
permissions:
  contents: write
  pull-requests: read

jobs:
  apk:
    name: Build & Release Native APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Read version
        id: version
        working-directory: android-native
        run: |
          # 从 src/version.json 读 (跟 TWA 共享)
          VERSION=$(node -p "require('../src/version.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install Gradle 8.5
        run: |
          # 不用 gradle/actions/setup-gradle (它的内置 cache 偶尔会挂掉阻塞 build)
          # 显式从 services.gradle.org 下载并解压
          GRADLE_VERSION="8.5"
          GRADLE_DIST="gradle-${GRADLE_VERSION}-bin.zip"
          GRADLE_HOME="/opt/gradle-${GRADLE_VERSION}"
          if [ ! -d "$GRADLE_HOME" ]; then
            echo "Downloading Gradle $GRADLE_VERSION ..."
            curl -sSL -o "/tmp/${GRADLE_DIST}" \
              "https://services.gradle.org/distributions/${GRADLE_DIST}"
            ls -la "/tmp/${GRADLE_DIST}"
            sudo mkdir -p "$GRADLE_HOME"
            sudo unzip -q "/tmp/${GRADLE_DIST}" -d /opt
            sudo ln -sf "/opt/gradle-${GRADLE_VERSION}/bin/gradle" /usr/local/bin/gradle
            gradle --version
          fi

      # Gradle 依赖缓存 (用 actions/cache, 失败不影响 build)
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-native/**/build.gradle.kts', 'android-native/**/settings.gradle.kts', 'android-native/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
        continue-on-error: true

      # Android SDK (API 34 + build-tools 34)
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'
          packages: |
            platforms;android-34
            build-tools;34.0.0
            platform-tools

      # 取固定的签名密钥 (第一次需要手动设置 Secrets, 见 README)
      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android-native/android.keystore
          ls -la android-native/android.keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.CHILLY_KEYSTORE_BASE64 }}

      - name: Build release APK
        working-directory: android-native
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android-native/android.keystore
          KEYSTORE_PASSWORD: ${{ secrets.CHILLY_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.CHILLY_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.CHILLY_KEY_PASSWORD }}
        run: |
          # 默认密码 (临时签名时用)
          export KEYSTORE_PASSWORD="${KEYSTORE_PASSWORD:-android}"
          export KEY_ALIAS="${KEY_ALIAS:-android}"
          export KEY_PASSWORD="${KEY_PASSWORD:-android}"
          export KEYSTORE_PATH="$PWD/android.keystore"

          if [ ! -f android.keystore ]; then
            echo "::warning::No keystore, generating a temporary one (cannot upgrade later)"
            keytool -genkeypair \
              -keystore android.keystore \
              -alias android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Chilly Phone, O=qiaoqiao, C=CN"
          fi
          ls -la android.keystore
          # 用 system gradle (避免 wrapper 下载 services.gradle.org)
          gradle assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: |
          ls -la android-native/app/build/outputs/apk/release/ 2>/dev/null
          APK=$(find android-native/app/build/outputs/apk/release -name "*.apk" ! -name "*unsigned*" ! -name "*unaligned*" | head -1)
          if [ -z "$APK" ]; then
            echo "No signed APK found"
            find android-native/app/build/outputs/ -name "*.apk"
            exit 1
          fi
          cp "$APK" "chilly-phone-native-${{ steps.version.outputs.version }}.apk"
          echo "Final: chilly-phone-native-${{ steps.version.outputs.version }}.apk"
          ls -la "chilly-phone-native-${{ steps.version.outputs.version }}.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chilly-phone-native-apk
          path: chilly-phone-native-*.apk
          retention-days: 90

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-native
          name: Chilly Phone Native ${{ steps.version.outputs.version }}
          files: chilly-phone-native-*.apk
          generate_release_notes: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
