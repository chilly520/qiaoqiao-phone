<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="./pwa-192x192.png?v=6" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png?v=6">
  <link rel="apple-touch-icon" sizes="152x152" href="./pwa-192x192.png?v=6">
  <link rel="apple-touch-icon" sizes="167x167" href="./pwa-192x192.png?v=6">
  <link rel="apple-touch-icon" sizes="180x180" href="./pwa-192x192.png?v=6">
  <link rel="manifest" href="./manifest.json?v=6">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Chilly Phone">
  <meta name="application-name" content="Chilly Phone">
  <meta name="theme-color" content="#b8d4e8" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1e293b" media="(prefers-color-scheme: dark)">
  <meta name="description" content="Chilly Phone - 与 AI 角色聊天的虚拟手机">
  <title>Chilly Phone</title>
</head>

<body>
  <!-- 原生 APP 内置 splash: WebView 启动到 Vue 挂载之间显示,
       避免白屏. Vue 挂载后由 App.vue 通过 #native-splash 移除.
       用 cat-logo.png (冰雪猫猫) 而不是 emoji. -->
  <div id="native-splash" style="position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#dbeafe 0%,#e0f2fe 50%,#fce7f3 100%);font-family:-apple-system,system-ui,'PingFang SC','Microsoft YaHei',sans-serif;color:#475569;transition:opacity .3s ease;">
    <img src="./cat-logo.png" style="width:120px;height:120px;border-radius:28px;box-shadow:0 8px 32px rgba(0,0,0,0.15);margin-bottom:20px;animation:native-splash-pulse 1.6s ease-in-out infinite;" alt="Chilly" />
    <div style="font-size:18px;font-weight:600;letter-spacing:.05em;">Chilly Phone</div>
    <div style="font-size:12px;margin-top:8px;opacity:.6;">加载中…</div>
  </div>
  <style>
    @keyframes native-splash-pulse {
      0%,100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.75; }
    }
    body.native-ready #native-splash { opacity: 0; pointer-events: none; }
  </style>
  <div id="app"></div>
  <!-- 诊断脚本必须在主 JS 之前, 才能捕获主 JS 的加载错误.
       type="module" 让 Vite 能处理 (脚本本身是 IIFE, 无 import/export, 安全).
       绝对路径 /native-diag.js: Vite 把它解析为 public/native-diag.js (原样拷贝到 dist 根).
       build 阶段 fix-script-tags 插件会去掉 type="module" 以适配 file:// WebView. -->
  <script type="module" src="/native-diag.js"></script>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
